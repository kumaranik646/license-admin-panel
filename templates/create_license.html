{% extends "base.html" %}

{% block title %}Create License{% endblock %}

{% block content %}
<div class="card">
    <h3>➕ Create New License</h3>
    <form method="POST" id="licenseForm">
        <div class="form-group">
            <label>License Key (leave empty for auto-generate)</label>
            <input type="text" name="license_key" placeholder="Auto-generated">
        </div>
        
        <div class="form-group">
            <label>Device ID (optional - lock to specific device)</label>
            <input type="text" name="device_id" placeholder="Enter device ID to lock license">
            <small>Leave empty to allow any device</small>
        </div>
        
        <div class="form-group">
            <label>Expiry Type</label>
            <select name="expiry_type" id="expiry_type" onchange="toggleExpiryFields()" class="form-control">
                <option value="days">Days</option>
                <option value="hours">Hours</option>
                <option value="minutes">Minutes</option>
                <option value="months">Months</option>
                <option value="years">Years</option>
                <option value="custom">Custom Date</option>
            </select>
        </div>
        
        <div id="value_fields" class="form-group">
            <label>Value</label>
            <input type="number" name="expiry_value" id="expiry_value" value="365" min="1" required class="form-control" style="width: 200px; display: inline-block;">
            <span id="value_unit" style="margin-left: 10px;">days</span>
        </div>
        
        <div id="custom_date_field" class="form-group" style="display: none;">
            <label>Expiry Date & Time</label>
            <input type="datetime-local" name="expiry_datetime_custom" id="expiry_datetime_custom" class="form-control">
        </div>
        
        <div class="form-group">
            <label>Status</label>
            <select name="status" class="form-control">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="suspended">Suspended</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="3" placeholder="Optional notes about this license" class="form-control"></textarea>
        </div>
        
        <button type="submit" class="btn btn-success">Create License</button>
        <a href="{{ url_for('licenses') }}" class="btn btn-primary">Cancel</a>
    </form>
</div>

<script>
function toggleExpiryFields() {
    var type = document.getElementById('expiry_type').value;
    var valueFields = document.getElementById('value_fields');
    var customDateField = document.getElementById('custom_date_field');
    var valueUnit = document.getElementById('value_unit');
    
    if (type === 'custom') {
        valueFields.style.display = 'none';
        customDateField.style.display = 'block';
    } else {
        valueFields.style.display = 'block';
        customDateField.style.display = 'none';
        
        if (type === 'days') {
            valueUnit.innerHTML = 'days';
            document.getElementById('expiry_value').placeholder = 'Enter number of days';
        } else if (type === 'hours') {
            valueUnit.innerHTML = 'hours';
            document.getElementById('expiry_value').placeholder = 'Enter number of hours';
        } else if (type === 'minutes') {
            valueUnit.innerHTML = 'minutes';
            document.getElementById('expiry_value').placeholder = 'Enter number of minutes';
        } else if (type === 'months') {
            valueUnit.innerHTML = 'months';
            document.getElementById('expiry_value').placeholder = 'Enter number of months';
        } else if (type === 'years') {
            valueUnit.innerHTML = 'years';
            document.getElementById('expiry_value').placeholder = 'Enter number of years';
        }
    }
}

// Set default date for custom field (current date + 1 year)
var defaultDate = new Date();
defaultDate.setFullYear(defaultDate.getFullYear() + 1);
document.getElementById('expiry_datetime_custom').value = defaultDate.toISOString().slice(0, 16);
</script>
{% endblock %}
