{% extends "base.html" %}

{% block page_title %}Edit Permissions{% endblock %}

{% block content %}
<div class="card">
    <h3>Edit Permissions for: {{ user.username }}</h3>
    
    <form method="POST" action="{{ url_for('edit_user_permissions', id=user.id) }}">
        <div class="form-group">
            <label>Role: <strong>{{ user.role }}</strong></label>
            <p><small>Admins have all permissions automatically. Sub-admins need permissions assigned below.</small></p>
        </div>
        
        <div class="form-group">
            <label>Permissions</label>
            {% for perm in permissions %}
            <div style="margin: 8px 0;">
                <label style="display: inline-block; width: auto; margin-left: 0;">
                    <input type="checkbox" name="permissions" value="{{ perm }}" {% if perm in user.get_permissions() %}checked{% endif %}>
                    {{ perm.replace('_', ' ').title() }}
                </label>
            </div>
            {% endfor %}
        </div>
        
        <button type="submit" class="btn btn-primary">Save Permissions</button>
        <a href="{{ url_for('users') }}" class="btn btn-warning">Cancel</a>
    </form>
</div>
{% endblock %}
